<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dither Booth</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="poster">
    <section class="panel panel-sidebar">
      <p class="kicker">Dither booth</p>
      <div class="controls">
        <button id="startButton" type="button">Start camera</button>
        <button id="captureButton" type="button" disabled>Capture frame</button>
        <button id="downloadButton" type="button" disabled>Download image</button>
      </div>
      <p id="status" class="status">Camera idle.</p>
      <div class="sidebar-copy">
        <p>camera.pde</p>
        <p>webcam input</p>
        <p>bayer dither</p>
        <p>single capture</p>
      </div>
    </section>

    <section class="panel panel-stage">
      <video id="sourceVideo" autoplay playsinline muted hidden></video>
      <canvas id="previewCanvas" width="640" height="480" aria-label="Live dithered camera preview"></canvas>
      <img id="snapshotImage" alt="Captured dithered photo">
    </section>

    <h1 class="poster-word">TAKE A SHOT</h1>
  </main>

  <script src="script.js"></script>
</body>
</html>
