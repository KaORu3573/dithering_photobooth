<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dither Booth</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="layout">
    <section class="hero">
      <p class="eyebrow">Browser photobooth</p>
      <h1>Turn `camera.pde` into a live website.</h1>
      <p class="intro">
        This page ports the Processing sketch into the browser using `getUserMedia()`,
        canvas pixel processing, and the same 8x8 Bayer matrix.
      </p>
      <div class="controls">
        <button id="startButton" type="button">Start camera</button>
        <button id="captureButton" type="button" disabled>Capture frame</button>
        <button id="downloadButton" type="button" disabled>Download image</button>
      </div>
      <label class="toggle" for="paletteSelect">
        <span>Palette</span>
        <select id="paletteSelect">
          <option value="mono">Black / white</option>
          <option value="blueGold">Blue / gold</option>
          <option value="cyanPink">Cyan / pink</option>
          <option value="rose">Rose</option>
        </select>
      </label>
      <p id="status" class="status">Camera idle.</p>
    </section>

    <section class="stage">
      <video id="sourceVideo" autoplay playsinline muted hidden></video>
      <canvas id="previewCanvas" width="640" height="480" aria-label="Live dithered camera preview"></canvas>
      <img id="snapshotImage" alt="Captured dithered photo">
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
